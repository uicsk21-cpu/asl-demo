<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ASL Translator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f1c;
      --panel:   #12152b;
      --accent:  #00d4ff;
      --green:   #00e87a;
      --amber:   #ffb830;
      --red:     #ff5f72;
      --text:    #f0f2ff;
      --muted:   #4a5070;
      --btn:     #3a2d9c;
      --btnhov:  #5040c0;
      --border:  #ffffff14;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Outer wrapper ───────────────────────────────────────────── */
    #wrapper {
      display: flex; flex-direction: column;
      height: 100dvh; height: 100vh;
    }

    /* ── Top-3 candidates display ────────────────────────────────── */
    #candidates {
      position: absolute; bottom: 62px; left: 12px;
      font-size: 0.65rem; letter-spacing: .05em;
      color: rgba(255,255,255,.50);
      pointer-events: none;
    }

    /* ── Main app (fills remaining height) ──────────────────────── */
    #app {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }

    /* ── Camera panel ───────────────────────────────────────────── */
    #cam-panel {
      position: relative;
      flex: 0 0 57%;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
    }

    #skeleton-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }

    /* Status chip */
    #status {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: color .3s, border-color .3s;
    }
    #status.loading  { color: var(--muted); border: 1px solid var(--muted); background:#0008; }
    #status.waiting  { color: var(--muted); border: 1px solid var(--muted); background:#0008; }
    #status.detected { color: var(--green); border: 1px solid var(--green); background:#00e87a12; }
    #status.error    { color: var(--red);   border: 1px solid var(--red);   background:#ff5f7212; }

    /* Camera-switch */
    #cam-switch {
      position: absolute; top: 8px; right: 10px;
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 1.2rem; padding: 6px 9px;
      cursor: pointer; touch-action: manipulation;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    /* ── Detected-letter badge ───────────────────────────────────── */
    #badge {
      position: absolute; bottom: 16px; left: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px 8px 12px;
      background: rgba(0,0,0,.72);
      border: 1.5px solid var(--accent); border-radius: 14px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      opacity: 0; transform: translateY(6px);
      transition: opacity .2s, transform .2s, border-color .3s;
    }
    #badge.visible       { opacity: 1; transform: translateY(0); }
    #badge.first-seen    { border-color: var(--amber); }
    #badge.confirmed-anim { border-color: var(--green); }

    #badge-ltr {
      font-size: 3rem; font-weight: 900;
      color: var(--accent); line-height: 1;
      transition: color .25s;
      min-width: 2rem; text-align: center;
    }
    #badge.first-seen    #badge-ltr { color: var(--amber); }
    #badge.confirmed-anim #badge-ltr { color: var(--green); }

    /* Spinner inside badge */
    #badge-spin {
      display: none;
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    #badge.fetching #badge-ltr { display: none; }
    #badge.fetching #badge-spin { display: block; }

    #badge-meta { display: flex; flex-direction: column; gap: 3px; }
    #badge-sub  { font-size: 0.78rem; font-weight: 600; color: var(--text); max-width: 180px; word-break: break-word; }
    #badge-hint { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── Flash animation on confirm ─────────────────────────────── */
    #flash {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      font-size: 9rem; font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 60px var(--green), 0 0 20px #fff;
      opacity: 0;
    }
    @keyframes letterFlash {
      0%   { opacity: 1; transform: scale(1.3); }
      60%  { opacity: .9; transform: scale(1);   }
      100% { opacity: 0; transform: scale(.8);   }
    }
    #flash.pop { animation: letterFlash .55s ease-out forwards; }

    /* ── Poll-progress bar at bottom of camera ───────────────────── */
    #poll-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 5px; background: rgba(255,255,255,.06);
    }
    #poll-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 0 3px 3px 0;
      transition: width .1s linear;
    }
    #poll-fill.fetching {
      width: 100% !important;
      background: linear-gradient(90deg, var(--accent) 30%, transparent);
      animation: sweep 1s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { transform: translateX(-100%); opacity: .8; }
      100% { transform: translateX(0);     opacity: .3; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Text / translation panel ────────────────────────────────── */
    #text-panel {
      flex: 1; min-height: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 14px 18px 18px; gap: 12px;
    }

    #panel-label {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: .14em; color: var(--muted); text-transform: uppercase;
    }

    #output {
      flex: 1; min-height: 0; overflow: hidden;
      font-size: clamp(2rem, 9vw, 5rem);
      font-weight: 800; letter-spacing: .14em;
      color: var(--text); word-break: break-all; line-height: 1.15;
    }
    #output.empty {
      font-size: 1.05rem; font-weight: 400;
      letter-spacing: .04em; color: var(--muted);
      display: flex; align-items: center;
    }

    #controls {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px; flex-shrink: 0;
    }

    #clear-btn {
      padding: 13px 30px;
      background: var(--btn); color: var(--text);
      border: none; border-radius: 13px;
      font-size: .95rem; font-weight: 700; letter-spacing: .1em;
      cursor: pointer; touch-action: manipulation;
      transition: background .15s, transform .1s;
    }
    #clear-btn:active { background: var(--btnhov); transform: scale(.97); }

    #char-count { font-size: .8rem; color: var(--muted); }

    /* ── Landscape: side-by-side ─────────────────────────────────── */
    @media (orientation: landscape) and (min-aspect-ratio: 13/9) {
      #app       { flex-direction: row; }
      #cam-panel { flex: 1; height: 100%; }
      #text-panel {
        width: 43%; height: 100%; flex-shrink: 0;
        border-top: none; border-left: 1px solid var(--border);
      }
    }

    /* ── Loading overlay ─────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 10; transition: opacity .4s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader-title  { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    #loader-status { font-size: .85rem; color: var(--muted); text-align: center; max-width: 280px; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">
  <div class="spinner"></div>
  <div id="loader-title">ASL Translator</div>
  <div id="loader-status">Starting camera…</div>
</div>

<!-- Outer wrapper -->
<div id="wrapper">

  <!-- App -->
  <div id="app">

    <!-- Camera panel -->
    <div id="cam-panel">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="skeleton-canvas"></canvas>

      <div id="status" class="loading">Loading…</div>
      <button id="cam-switch" title="Switch camera">⇄</button>

      <!-- Letter badge (bottom-left) -->
      <div id="badge">
        <div id="badge-spin"></div>
        <span id="badge-ltr">—</span>
        <div id="badge-meta">
          <span id="badge-sub">—</span>
          <span id="badge-hint">ASL Classifier</span>
        </div>
      </div>

      <!-- Top-3 candidates -->
      <div id="candidates"></div>

      <!-- Full-frame flash on confirm -->
      <div id="flash"></div>

      <!-- Polling progress bar -->
      <div id="poll-track"><div id="poll-fill"></div></div>
    </div>

    <!-- Text panel -->
    <div id="text-panel">
      <div id="panel-label">Translated text</div>
      <div id="output" class="empty">Show a hand sign…</div>
      <div id="controls">
        <button id="clear-btn">⌫  CLEAR</button>
        <span id="char-count">0 chars</span>
      </div>
    </div>

  </div><!-- /#app -->
</div><!-- /#wrapper -->

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm";

// ═══════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const WASM_CDN     = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm";
const MP_MODEL_URL = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";
const HOLD_MS      = 800;   // ms to hold a sign before confirming
const CONF_THRESH  = 0.78;  // fraction of recent frames that must agree
const HIST_FRAMES  = 10;    // sliding window size for majority vote

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

// ═══════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════
let translated  = "";
let frameHist   = [];    // last N top letters for majority vote
let holdLetter  = null;  // letter currently building hold
let holdStart   = 0;     // timestamp when hold started
let lastConfirm = "";    // last confirmed letter (prevent immediate re-confirm)
let lastVidTime = -1;
let handPresent = false;
let running     = false;
let facingMode  = "user";
let detector    = null;
let stream      = null;

// ═══════════════════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════════════════
const video        = document.getElementById("video");
const canvas       = document.getElementById("skeleton-canvas");
const ctx          = canvas.getContext("2d");
const statusEl     = document.getElementById("status");
const badge        = document.getElementById("badge");
const badgeLtr     = document.getElementById("badge-ltr");
const badgeSub     = document.getElementById("badge-sub");
const badgeHint    = document.getElementById("badge-hint");
const pollFill     = document.getElementById("poll-fill");
const flashEl      = document.getElementById("flash");
const outputEl     = document.getElementById("output");
const charCount    = document.getElementById("char-count");
const candidatesEl = document.getElementById("candidates");

// ═══════════════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════════════
async function startCamera(facing) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  await video.play();
}

// ═══════════════════════════════════════════════════════════════════════
//  MEDIAPIPE  (hand presence detection + skeleton only)
// ═══════════════════════════════════════════════════════════════════════
async function setupDetector() {
  const fs = await FilesetResolver.forVisionTasks(WASM_CDN);
  detector = await HandLandmarker.createFromOptions(fs, {
    baseOptions: { modelAssetPath: MP_MODEL_URL, delegate: "GPU" },
    runningMode: "VIDEO",
    numHands: 1,
    minHandDetectionConfidence: 0.50,
    minHandPresenceConfidence: 0.45,
    minTrackingConfidence: 0.45,
  });
}

const FINGER_COLORS = ["#ff6b88","#ffb830","#00d4ff","#a78bfa","#00e87a"];
const LM_COLOR = Array.from({length: 21}, (_, i) => {
  if (i === 0) return "#ccc";
  return FINGER_COLORS[Math.min(i <= 4 ? 0 : Math.floor((i-5)/4)+1, 4)];
});

function drawSkeleton(lm, w, h) {
  ctx.clearRect(0, 0, w, h);
  const pts = lm.map(l => ({ x: l.x * w, y: l.y * h }));
  ctx.lineWidth = 2.5; ctx.strokeStyle = "rgba(255,255,255,.20)";
  CONNECTIONS.forEach(([a,b]) => {
    ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke();
  });
  pts.forEach((p, i) => {
    const tip = [4,8,12,16,20].includes(i);
    ctx.beginPath(); ctx.arc(p.x, p.y, tip ? 7 : 4.5, 0, Math.PI*2);
    ctx.fillStyle = LM_COLOR[i]; ctx.fill();
    if (tip) {
      ctx.strokeStyle = "rgba(255,255,255,.4)"; ctx.lineWidth = 1.5; ctx.stroke();
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════
//  ASL GEOMETRIC CLASSIFIER
// ═══════════════════════════════════════════════════════════════════════
function classifyASL(lm) {
  // Returns [{letter, confidence}, ...] sorted descending, or null
  const scale = Math.hypot(lm[9].x - lm[0].x, lm[9].y - lm[0].y);
  if (scale < 0.05) return null;

  const d = (a, b) => Math.hypot(lm[a].x - lm[b].x, lm[a].y - lm[b].y) / scale;

  // Finger extension: positive = tip above MCP (finger pointing up in image)
  const ie = (lm[5].y  - lm[8].y)  / scale;   // index
  const me = (lm[9].y  - lm[12].y) / scale;   // middle
  const re = (lm[13].y - lm[16].y) / scale;   // ring
  const pe = (lm[17].y - lm[20].y) / scale;   // pinky

  const iUp = ie > 0.35,   iDn = ie < 0.08;
  const mUp = me > 0.35,   mDn = me < 0.08;
  const rUp = re > 0.35,   rDn = re < 0.08;
  const pUp = pe > 0.35,   pDn = pe < 0.08;

  // Thumb
  const thumbOut      = d(4, 5) > 0.55;           // abducted from index MCP
  const avgPIPy       = (lm[6].y + lm[10].y + lm[14].y + lm[18].y) / 4;
  const thumbOverFist = !thumbOut &&               // tip inside finger span AND above PIPs
                        lm[4].y < avgPIPy &&
                        lm[4].x > Math.min(lm[17].x, lm[5].x) - 0.12 * scale &&
                        lm[4].x < Math.max(lm[17].x, lm[5].x) + 0.12 * scale;
  const thumbUnder    = lm[4].y > (lm[5].y + lm[9].y + lm[13].y) / 3; // tip below MCPs

  // Tip distances (normalised)
  const ti = d(4, 8);   // thumb ↔ index tip
  const tm = d(4, 12);  // thumb ↔ middle tip
  const tr = d(4, 16);  // thumb ↔ ring tip
  const im = d(8, 12);  // index ↔ middle tip spread
  const mr = d(12, 16); // middle ↔ ring tip spread

  // Directional helpers
  const iSide = Math.abs(lm[8].x  - lm[5].x)  > Math.abs(lm[8].y  - lm[5].y);
  const mSide = Math.abs(lm[12].x - lm[9].x)  > Math.abs(lm[12].y - lm[9].y);
  const iDown = lm[8].y  > lm[0].y + 0.10 * scale;  // index pointing down
  const tDown = lm[4].y  > lm[0].y + 0.10 * scale;  // thumb pointing down
  const iHook = !iUp && lm[8].y > lm[6].y - 0.06 * scale; // index hooked (X)

  // Weighted scorer: alternating (condition, weight) pairs → 0..1
  const W = (...args) => {
    let sum = 0, total = 0;
    for (let k = 0; k < args.length; k += 2) {
      total += args[k + 1];
      if (args[k]) sum += args[k + 1];
    }
    return total > 0 ? sum / total : 0;
  };

  const scores = {
    // ── Closed-fist group (all fingers curled) ───────────────────────
    A: W(iDn,3, mDn,3, rDn,3, pDn,3, thumbOut,3, !thumbOverFist,2),
    E: W(ie<0.2,2, me<0.2,2, re<0.2,2, pe<0.2,2, thumbUnder,3, !thumbOut,2),
    M: W(iDn,3, mDn,3, rDn,2, pDn,1, thumbUnder,4, !thumbOut,2),
    N: W(iDn,3, mDn,3, !rUp,2, !pUp,2, thumbUnder,3, !thumbOut,2),
    S: W(iDn,3, mDn,3, rDn,3, pDn,3, thumbOverFist,4),
    T: W(iDn,2, mDn,3, rDn,3, pDn,3, d(4,6)<0.35,4, !thumbOut,2),

    // ── Single finger / thumb ────────────────────────────────────────
    D: W(iUp,4, !mUp,2, !rUp,2, !pUp,2, tm<0.40,2, tr<0.40,2),
    G: W(iSide,4, !mUp,2, !rUp,2, !pUp,2, thumbOut,2),
    I: W(!iUp,3, !mUp,3, !rUp,3, pUp,5),
    L: W(iUp,4, !mUp,3, !rUp,2, !pUp,2, thumbOut,3),
    X: W(iHook,5, !mUp,3, !rUp,2, !pUp,2),

    // ── Curved / round shapes ────────────────────────────────────────
    C: W(ie>-0.05&&ie<0.45,2, me>-0.05&&me<0.45,2, re>-0.1&&re<0.4,2,
         pe>-0.1&&pe<0.4,1, ti>0.25&&ti<0.70,2),
    F: W(ti<0.22,4, mUp,3, rUp,2, pUp,2, !iUp,2),
    O: W(ti<0.25,4, tm<0.35,3, tr<0.45,2, !iUp,2, !mUp,2),

    // ── Two-finger group ─────────────────────────────────────────────
    H: W(iSide,3, mSide,3, !rUp,2, !pUp,2, im<0.28,2),
    R: W(iUp,4, mUp,4, !rUp,3, !pUp,3, im<0.13,3),
    U: W(iUp,4, mUp,4, !rUp,3, !pUp,3, im<0.18,3),
    V: W(iUp,4, mUp,4, !rUp,3, !pUp,3, im>0.22,3),

    // ── Three-finger group ───────────────────────────────────────────
    K: W(iUp,3, me>0.15&&me<0.5,3, !rUp,2, !pUp,2, thumbOut,2),
    W: W(iUp,3, mUp,3, rUp,3, !pUp,3),

    // ── Four fingers ─────────────────────────────────────────────────
    B: W(iUp,3, mUp,3, rUp,3, pUp,3, !thumbOut,2, im<0.25,1, mr<0.25,1),

    // ── Thumb + pinky ────────────────────────────────────────────────
    Y: W(!iUp,3, !mUp,3, !rUp,3, pUp,4, thumbOut,4),

    // ── Pointing down ────────────────────────────────────────────────
    P: W(iDown,4, thumbOut,3, !mUp,2, !rUp,2, !pUp,2),
    Q: W(iDown,3, tDown,4, !mUp,2, !rUp,2, !pUp,2),
  };

  return Object.entries(scores)
    .map(([letter, sc]) => ({ letter, confidence: sc }))
    .sort((a, b) => b.confidence - a.confidence);
}

function majorityVote(hist) {
  if (!hist.length) return { letter: null, fraction: 0 };
  const counts = {};
  for (const l of hist) counts[l] = (counts[l] || 0) + 1;
  const [letter, count] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
  return { letter, fraction: count / hist.length };
}

// ═══════════════════════════════════════════════════════════════════════
//  BADGE UI HELPERS
// ═══════════════════════════════════════════════════════════════════════
function showBadge(votedLetter, conf, holdFrac, top3) {
  badge.className = "visible" + (holdFrac > 0.05 ? " first-seen" : "");
  badgeLtr.textContent = votedLetter;
  badgeSub.textContent = holdFrac > 0.05
    ? `Hold ${Math.round(holdFrac * 100)}%`
    : `${Math.round(conf * 100)}% match`;
  badgeHint.textContent = "ASL Classifier";
  if (candidatesEl && top3.length > 1) {
    candidatesEl.textContent = top3.slice(1, 3)
      .map(t => `${t.letter} ${Math.round(t.confidence * 100)}%`).join("  ·  ");
  }
  pollFill.classList.remove("fetching");
  pollFill.style.width = `${Math.min(100, holdFrac * 100)}%`;
}

function hideBadge() {
  badge.className = "";
  if (candidatesEl) candidatesEl.textContent = "";
  pollFill.style.width = "0%";
}

function flashConfirmed(letter) {
  flashEl.textContent = letter;
  flashEl.classList.remove("pop");
  void flashEl.offsetWidth;
  flashEl.classList.add("pop");
  setTimeout(() => flashEl.classList.remove("pop"), 600);
  badge.classList.add("confirmed-anim");
  badgeSub.textContent = "✓ Added";
  setTimeout(() => badge.classList.remove("confirmed-anim"), 700);
}

// ═══════════════════════════════════════════════════════════════════════
//  OUTPUT TEXT
// ═══════════════════════════════════════════════════════════════════════
function updateOutput() {
  charCount.textContent = `${translated.length} char${translated.length !== 1 ? "s" : ""}`;
  if (!translated) {
    outputEl.className   = "empty";
    outputEl.textContent = "Show a hand sign…";
  } else {
    outputEl.className   = "";
    outputEl.textContent = translated.slice(-40);
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  DETECTION LOOP
// ═══════════════════════════════════════════════════════════════════════
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  if (video.readyState < 2) return;
  if (canvas.width  !== video.videoWidth)  canvas.width  = video.videoWidth;
  if (canvas.height !== video.videoHeight) canvas.height = video.videoHeight;
  if (video.currentTime === lastVidTime) return;
  lastVidTime = video.currentTime;

  const now    = performance.now();
  const result = detector.detectForVideo(video, now);
  const lmList = result?.landmarks;
  handPresent  = !!(lmList?.length);

  if (!handPresent) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    statusEl.textContent = "Show hand…"; statusEl.className = "waiting";
    frameHist = []; holdLetter = null; lastConfirm = "";
    hideBadge();
    return;
  }

  drawSkeleton(lmList[0], canvas.width, canvas.height);
  statusEl.textContent = "Hand detected"; statusEl.className = "detected";

  // ── Classify this frame
  const clsResult = classifyASL(lmList[0]);
  if (!clsResult) return;

  frameHist.push(clsResult[0].letter);
  if (frameHist.length > HIST_FRAMES) frameHist.shift();

  const { letter: voted, fraction } = majorityVote(frameHist);

  // ── Hold & confirm
  let holdFrac = 0;
  if (fraction >= CONF_THRESH) {
    if (holdLetter !== voted) {
      holdLetter = voted;
      holdStart  = now;
      if (voted !== lastConfirm) lastConfirm = ""; // new letter → clear block
    }
    const held = now - holdStart;
    holdFrac = Math.min(1, held / HOLD_MS);

    if (held >= HOLD_MS && voted !== lastConfirm) {
      translated += voted;
      lastConfirm = voted;
      holdLetter  = null;
      updateOutput();
      flashConfirmed(voted);
    }
  } else {
    holdLetter = null;
    if (fraction < 0.35) lastConfirm = ""; // low confidence → allow re-confirm
  }

  showBadge(voted, fraction, holdFrac, clsResult);
}

// ═══════════════════════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════════
document.getElementById("clear-btn").addEventListener("click", () => {
  translated  = "";
  lastConfirm = "";
  holdLetter  = null;
  frameHist   = [];
  updateOutput();
});

document.getElementById("cam-switch").addEventListener("click", async () => {
  facingMode = facingMode === "user" ? "environment" : "user";
  running = false;
  await startCamera(facingMode);
  running = true; loop();
});

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════
const loader       = document.getElementById("loader");
const loaderStatus = document.getElementById("loader-status");

(async () => {
  try {
    loaderStatus.textContent = "Requesting camera…";
    await startCamera(facingMode);

    loaderStatus.textContent = "Loading hand-detection model (~8 MB)…";
    await setupDetector();

    loader.classList.add("hidden");
    statusEl.textContent = "Show hand…"; statusEl.className = "waiting";
    updateOutput();
    running = true; loop();

  } catch (err) {
    loaderStatus.textContent = "";
    document.querySelector(".spinner").style.display = "none";
    const msg = document.createElement("div");
    msg.style.cssText = "color:#ff5f72;font-size:.9rem;max-width:300px;text-align:center;line-height:1.6";
    msg.innerHTML = err.name === "NotAllowedError"
      ? "Camera access denied.<br>Allow camera permission and reload."
      : `Error: ${err.message}<br><small>Open via <strong>HTTPS</strong> or <strong>localhost</strong>.</small>`;
    loader.appendChild(msg);
    console.error(err);
  }
})();
</script>
</body>
</html>
