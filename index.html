<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ASL Translator — Gemini Vision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f1c;
      --panel:   #12152b;
      --accent:  #00d4ff;
      --green:   #00e87a;
      --amber:   #ffb830;
      --red:     #ff5f72;
      --text:    #f0f2ff;
      --muted:   #4a5070;
      --btn:     #3a2d9c;
      --btnhov:  #5040c0;
      --border:  #ffffff14;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Outer wrapper: API bar + app stacked ───────────────────── */
    #wrapper {
      display: flex; flex-direction: column;
      height: 100dvh; height: 100vh;
    }

    /* ── API Key bar ─────────────────────────────────────────────── */
    #apibar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px;
      height: 48px;
      background: #0a0c18;
      border-bottom: 1px solid var(--border);
    }

    #apibar-icon { font-size: 1rem; flex-shrink: 0; }

    #apikey-input {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 0.8rem;
      font-family: monospace;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color .2s;
      min-width: 0;
    }
    #apikey-input:focus { border-color: var(--accent); }
    #apikey-input::placeholder { color: var(--muted); font-family: sans-serif; letter-spacing: 0; }

    #apibar-status {
      flex-shrink: 0;
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 10px;
      white-space: nowrap;
    }
    #apibar-status.ok    { color: var(--green); background: #00e87a14; }
    #apibar-status.err   { color: var(--red);   background: #ff5f7214; }
    #apibar-status.empty { color: var(--muted); }

    /* ── Main app (fills remaining height) ──────────────────────── */
    #app {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }

    /* ── Camera panel ───────────────────────────────────────────── */
    #cam-panel {
      position: relative;
      flex: 0 0 57%;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
    }

    #skeleton-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }

    /* Status chip */
    #status {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: color .3s, border-color .3s;
    }
    #status.loading  { color: var(--muted); border: 1px solid var(--muted); background:#0008; }
    #status.waiting  { color: var(--muted); border: 1px solid var(--muted); background:#0008; }
    #status.detected { color: var(--green); border: 1px solid var(--green); background:#00e87a12; }
    #status.error    { color: var(--red);   border: 1px solid var(--red);   background:#ff5f7212; }

    /* Camera-switch */
    #cam-switch {
      position: absolute; top: 8px; right: 10px;
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 1.2rem; padding: 6px 9px;
      cursor: pointer; touch-action: manipulation;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    /* ── Detected-letter badge ───────────────────────────────────── */
    #badge {
      position: absolute; bottom: 16px; left: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px 8px 12px;
      background: rgba(0,0,0,.72);
      border: 1.5px solid var(--accent); border-radius: 14px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      opacity: 0; transform: translateY(6px);
      transition: opacity .2s, transform .2s, border-color .3s;
    }
    #badge.visible       { opacity: 1; transform: translateY(0); }
    #badge.first-seen    { border-color: var(--amber); }
    #badge.confirmed-anim { border-color: var(--green); }

    #badge-ltr {
      font-size: 3rem; font-weight: 900;
      color: var(--accent); line-height: 1;
      transition: color .25s;
      min-width: 2rem; text-align: center;
    }
    #badge.first-seen    #badge-ltr { color: var(--amber); }
    #badge.confirmed-anim #badge-ltr { color: var(--green); }

    /* Spinner inside badge */
    #badge-spin {
      display: none;
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    #badge.fetching #badge-ltr { display: none; }
    #badge.fetching #badge-spin { display: block; }

    #badge-meta { display: flex; flex-direction: column; gap: 3px; }
    #badge-sub  { font-size: 0.78rem; font-weight: 600; color: var(--text); max-width: 180px; word-break: break-word; }
    #badge-hint { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── Flash animation on confirm ─────────────────────────────── */
    #flash {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      font-size: 9rem; font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 60px var(--green), 0 0 20px #fff;
      opacity: 0;
    }
    @keyframes letterFlash {
      0%   { opacity: 1; transform: scale(1.3); }
      60%  { opacity: .9; transform: scale(1);   }
      100% { opacity: 0; transform: scale(.8);   }
    }
    #flash.pop { animation: letterFlash .55s ease-out forwards; }

    /* ── Poll-progress bar at bottom of camera ───────────────────── */
    #poll-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 5px; background: rgba(255,255,255,.06);
    }
    #poll-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 0 3px 3px 0;
      transition: width .1s linear;
    }
    #poll-fill.fetching {
      width: 100% !important;
      background: linear-gradient(90deg, var(--accent) 30%, transparent);
      animation: sweep 1s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { transform: translateX(-100%); opacity: .8; }
      100% { transform: translateX(0);     opacity: .3; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Text / translation panel ────────────────────────────────── */
    #text-panel {
      flex: 1; min-height: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 14px 18px 18px; gap: 12px;
    }

    #panel-label {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: .14em; color: var(--muted); text-transform: uppercase;
    }

    #output {
      flex: 1; min-height: 0; overflow: hidden;
      font-size: clamp(2rem, 9vw, 5rem);
      font-weight: 800; letter-spacing: .14em;
      color: var(--text); word-break: break-all; line-height: 1.15;
    }
    #output.empty {
      font-size: 1.05rem; font-weight: 400;
      letter-spacing: .04em; color: var(--muted);
      display: flex; align-items: center;
    }

    #controls {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px; flex-shrink: 0;
    }

    #clear-btn {
      padding: 13px 30px;
      background: var(--btn); color: var(--text);
      border: none; border-radius: 13px;
      font-size: .95rem; font-weight: 700; letter-spacing: .1em;
      cursor: pointer; touch-action: manipulation;
      transition: background .15s, transform .1s;
    }
    #clear-btn:active { background: var(--btnhov); transform: scale(.97); }

    #char-count { font-size: .8rem; color: var(--muted); }

    /* ── Landscape: side-by-side ─────────────────────────────────── */
    @media (orientation: landscape) and (min-aspect-ratio: 13/9) {
      #app       { flex-direction: row; }
      #cam-panel { flex: 1; height: 100%; }
      #text-panel {
        width: 43%; height: 100%; flex-shrink: 0;
        border-top: none; border-left: 1px solid var(--border);
      }
    }

    /* ── Loading overlay ─────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 10; transition: opacity .4s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader-title  { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    #loader-status { font-size: .85rem; color: var(--muted); text-align: center; max-width: 280px; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">
  <div class="spinner"></div>
  <div id="loader-title">ASL Translator</div>
  <div id="loader-status">Starting camera…</div>
</div>

<!-- Outer wrapper -->
<div id="wrapper">

  <!-- API key bar -->
  <div id="apibar">
    <span id="apibar-icon">🔑</span>
    <input id="apikey-input" type="password"
           placeholder="Paste Gemini API key (free at aistudio.google.com)"
           autocomplete="off" spellcheck="false">
    <span id="apibar-status" class="empty">No key</span>
  </div>

  <!-- App -->
  <div id="app">

    <!-- Camera panel -->
    <div id="cam-panel">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="skeleton-canvas"></canvas>

      <div id="status" class="loading">Loading…</div>
      <button id="cam-switch" title="Switch camera">⇄</button>

      <!-- Letter badge (bottom-left) -->
      <div id="badge">
        <div id="badge-spin"></div>
        <span id="badge-ltr">—</span>
        <div id="badge-meta">
          <span id="badge-sub">—</span>
          <span id="badge-hint">Gemini Vision</span>
        </div>
      </div>

      <!-- Full-frame flash on confirm -->
      <div id="flash"></div>

      <!-- Polling progress bar -->
      <div id="poll-track"><div id="poll-fill"></div></div>
    </div>

    <!-- Text panel -->
    <div id="text-panel">
      <div id="panel-label">Translated text</div>
      <div id="output" class="empty">Show a hand sign…</div>
      <div id="controls">
        <button id="clear-btn">⌫  CLEAR</button>
        <span id="char-count">0 chars</span>
      </div>
    </div>

  </div><!-- /#app -->
</div><!-- /#wrapper -->

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm";

// ═══════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const WASM_CDN     = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm";
const MP_MODEL_URL = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";
const GEMINI_URL   = "https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent";
const GEMINI_PROMPT = "Look at this hand. What ASL letter is being signed? Reply with ONLY a single capital letter A-Z, or NONE if no clear ASL letter is visible.";
const POLL_MS      = 2000;   // ms between Gemini calls (free tier: 15 RPM max)
const CONFIRM_NEED = 2;      // consecutive same-letter responses needed to confirm

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

// ═══════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════
let apiKey        = localStorage.getItem("gemini_api_key") || "";
let translated    = "";
let lastLetter    = "";   // last Gemini result
let consecCount   = 0;    // consecutive same-letter count
let isFetching    = false;
let lastPollTime  = 0;
let lastVidTime   = -1;
let handPresent   = false;
let running       = false;
let facingMode    = "user";
let detector      = null;
let stream        = null;

// ═══════════════════════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════════════════════
const video       = document.getElementById("video");
const canvas      = document.getElementById("skeleton-canvas");
const ctx         = canvas.getContext("2d");
const statusEl    = document.getElementById("status");
const badge       = document.getElementById("badge");
const badgeLtr    = document.getElementById("badge-ltr");
const badgeSub    = document.getElementById("badge-sub");
const badgeHint   = document.getElementById("badge-hint");
const pollFill    = document.getElementById("poll-fill");
const flashEl     = document.getElementById("flash");
const outputEl    = document.getElementById("output");
const charCount   = document.getElementById("char-count");
const apikeyInput = document.getElementById("apikey-input");
const apibarStatus = document.getElementById("apibar-status");

// ═══════════════════════════════════════════════════════════════════════
//  API KEY MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════
function applyKey(key) {
  apiKey = key.trim();
  localStorage.setItem("gemini_api_key", apiKey);
  if (apiKey) {
    apibarStatus.textContent = "Key saved";
    apibarStatus.className = "ok";
  } else {
    apibarStatus.textContent = "No key";
    apibarStatus.className = "empty";
  }
}

// Initialise input from saved value
if (apiKey) {
  apikeyInput.value = apiKey;
  apibarStatus.textContent = "Key saved";
  apibarStatus.className = "ok";
}

apikeyInput.addEventListener("change", () => applyKey(apikeyInput.value));
apikeyInput.addEventListener("keydown", e => { if (e.key === "Enter") applyKey(apikeyInput.value); });

// ═══════════════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════════════
async function startCamera(facing) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  await video.play();
}

// ═══════════════════════════════════════════════════════════════════════
//  MEDIAPIPE  (hand presence detection + skeleton only)
// ═══════════════════════════════════════════════════════════════════════
async function setupDetector() {
  const fs = await FilesetResolver.forVisionTasks(WASM_CDN);
  detector = await HandLandmarker.createFromOptions(fs, {
    baseOptions: { modelAssetPath: MP_MODEL_URL, delegate: "GPU" },
    runningMode: "VIDEO",
    numHands: 1,
    minHandDetectionConfidence: 0.50,
    minHandPresenceConfidence: 0.45,
    minTrackingConfidence: 0.45,
  });
}

const FINGER_COLORS = ["#ff6b88","#ffb830","#00d4ff","#a78bfa","#00e87a"];
const LM_COLOR = Array.from({length: 21}, (_, i) => {
  if (i === 0) return "#ccc";
  return FINGER_COLORS[Math.min(i <= 4 ? 0 : Math.floor((i-5)/4)+1, 4)];
});

function drawSkeleton(lm, w, h) {
  ctx.clearRect(0, 0, w, h);
  const pts = lm.map(l => ({ x: l.x * w, y: l.y * h }));
  ctx.lineWidth = 2.5; ctx.strokeStyle = "rgba(255,255,255,.20)";
  CONNECTIONS.forEach(([a,b]) => {
    ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke();
  });
  pts.forEach((p, i) => {
    const tip = [4,8,12,16,20].includes(i);
    ctx.beginPath(); ctx.arc(p.x, p.y, tip ? 7 : 4.5, 0, Math.PI*2);
    ctx.fillStyle = LM_COLOR[i]; ctx.fill();
    if (tip) {
      ctx.strokeStyle = "rgba(255,255,255,.4)"; ctx.lineWidth = 1.5; ctx.stroke();
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════
//  FRAME CAPTURE  (mirrors the image to match what the user sees)
// ═══════════════════════════════════════════════════════════════════════
function captureFrame() {
  const w = video.videoWidth, h = video.videoHeight;
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const x = c.getContext("2d");
  x.translate(w, 0); x.scale(-1, 1);   // mirror to match CSS transform
  x.drawImage(video, 0, 0);
  // Crop to centre 75% width to focus on the hand and reduce noise
  const cw = Math.round(w * 0.75), ch = h;
  const crop = document.createElement("canvas");
  crop.width = cw; crop.height = ch;
  crop.getContext("2d").drawImage(c, Math.round(w*0.125), 0, cw, ch, 0, 0, cw, ch);
  return crop.toDataURL("image/jpeg", 0.85).split(",")[1];
}

// ═══════════════════════════════════════════════════════════════════════
//  GEMINI API CALL
// ═══════════════════════════════════════════════════════════════════════
async function callGemini() {
  if (!apiKey) {
    setBadgeError("No API key");
    return;
  }
  if (isFetching) return;

  isFetching = true;
  lastPollTime = performance.now();
  setBadgeFetching();
  pollFill.classList.add("fetching");

  try {
    const imageB64 = captureFrame();

    const res = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: GEMINI_PROMPT },
          { inline_data: { mime_type: "image/jpeg", data: imageB64 } }
        ]}],
        generationConfig: { maxOutputTokens: 10, temperature: 0.1, topK: 1 },
      }),
    });

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const msg = body?.error?.message || `HTTP ${res.status}`;
      const statusLabel = res.status === 400 ? `400 Bad Request`
                        : res.status === 401 ? `401 Unauthorized`
                        : res.status === 403 ? `403 Forbidden`
                        : res.status === 429 ? `429 Rate Limit`
                        : `HTTP ${res.status}`;
      console.error("Gemini error:", res.status, msg, body);
      apibarStatus.textContent = statusLabel;
      apibarStatus.className = "err";
      throw new Error(msg);
    }

    apibarStatus.textContent = "Key OK ✓";
    apibarStatus.className = "ok";

    const data = await res.json();
    const raw  = (data?.candidates?.[0]?.content?.parts?.[0]?.text || "").trim().toUpperCase();
    handleGeminiResult(raw);

  } catch (err) {
    console.error("Gemini:", err.message);
    setBadgeError(err.message);
  } finally {
    isFetching = false;
    pollFill.classList.remove("fetching");
  }
}

// ─── Parse and process Gemini's text reply ──────────────────────────
function handleGeminiResult(raw) {
  // Accept "A", "A.", "B (open hand)", etc. Reject "NONE", "NO …", empty
  let letter = null;
  if (raw && !raw.startsWith("NONE") && !/^NO[\s\b]/.test(raw)) {
    const m = raw.match(/^([A-Z])[^A-Z]?/);
    if (m) letter = m[1];
  }

  if (!letter) {
    // No sign visible
    lastLetter  = "";
    consecCount = 0;
    setBadgeNone();
    return;
  }

  setBadgeLetter(letter, consecCount + 1);

  if (letter === lastLetter) {
    consecCount++;
    if (consecCount >= CONFIRM_NEED) {
      // ── CONFIRMED ──────────────────────────────────────────────
      translated += letter;
      updateOutput();
      flashConfirmed(letter);
      lastLetter  = "";     // require hand reset before same letter again
      consecCount = 0;
      badge.classList.remove("first-seen");
    } else {
      badge.classList.add("first-seen");
    }
  } else {
    lastLetter  = letter;
    consecCount = 1;
    badge.classList.remove("first-seen", "confirmed-anim");
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  BADGE UI HELPERS
// ═══════════════════════════════════════════════════════════════════════
function setBadgeFetching() {
  badge.className = "visible fetching";
  badgeSub.textContent  = "Analyzing…";
  badgeHint.textContent = "Gemini Vision";
}

function setBadgeLetter(letter, count) {
  badge.className = "visible" + (count >= CONFIRM_NEED ? " first-seen" : "");
  badgeLtr.textContent  = letter;
  badgeSub.textContent  = count >= CONFIRM_NEED ? "Hold…" : `Seen ${count}/${CONFIRM_NEED}`;
  badgeHint.textContent = "Gemini Vision";
}

function setBadgeNone() {
  badge.className = "visible";
  badgeLtr.textContent  = "—";
  badgeSub.textContent  = "No sign";
  badgeHint.textContent = "Gemini Vision";
}

function setBadgeError(msg) {
  badge.className = "visible";
  badgeLtr.textContent  = "⚠";
  badgeSub.textContent  = msg;
  badgeHint.textContent = "Check API key";
}

function flashConfirmed(letter) {
  flashEl.textContent = letter;
  flashEl.classList.remove("pop");
  void flashEl.offsetWidth;
  flashEl.classList.add("pop");
  setTimeout(() => flashEl.classList.remove("pop"), 600);
  // Brief green pulse on badge
  badge.classList.add("confirmed-anim");
  setTimeout(() => badge.classList.remove("confirmed-anim"), 500);
}

// ═══════════════════════════════════════════════════════════════════════
//  OUTPUT TEXT
// ═══════════════════════════════════════════════════════════════════════
function updateOutput() {
  charCount.textContent = `${translated.length} char${translated.length !== 1 ? "s" : ""}`;
  if (!translated) {
    outputEl.className   = "empty";
    outputEl.textContent = "Show a hand sign…";
  } else {
    outputEl.className   = "";
    outputEl.textContent = translated.slice(-40);
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  DETECTION LOOP
// ═══════════════════════════════════════════════════════════════════════
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  if (video.readyState < 2) return;
  if (canvas.width  !== video.videoWidth)  canvas.width  = video.videoWidth;
  if (canvas.height !== video.videoHeight) canvas.height = video.videoHeight;
  if (video.currentTime === lastVidTime) return;
  lastVidTime = video.currentTime;

  // ── MediaPipe: detect hand presence & draw skeleton ──────────────
  const result = detector.detectForVideo(video, performance.now());
  const lmList = result?.landmarks;
  handPresent  = !!(lmList?.length);

  if (handPresent) {
    drawSkeleton(lmList[0], canvas.width, canvas.height);
    statusEl.textContent = "Hand detected"; statusEl.className = "detected";
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    statusEl.textContent = "Show hand…"; statusEl.className = "waiting";
    if (!isFetching) {
      badge.classList.remove("visible", "first-seen", "confirmed-anim");
      lastLetter = ""; consecCount = 0;
    }
  }

  // ── Polling progress bar ─────────────────────────────────────────
  if (!isFetching) {
    const elapsed  = performance.now() - lastPollTime;
    const progress = Math.min(1, elapsed / POLL_MS);
    pollFill.style.width = `${progress * 100}%`;
  }

  // ── Trigger Gemini poll ──────────────────────────────────────────
  const now = performance.now();
  if (handPresent && !isFetching && apiKey && now - lastPollTime >= POLL_MS) {
    callGemini();
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════════
document.getElementById("clear-btn").addEventListener("click", () => {
  translated  = "";
  lastLetter  = "";
  consecCount = 0;
  updateOutput();
});

document.getElementById("cam-switch").addEventListener("click", async () => {
  facingMode = facingMode === "user" ? "environment" : "user";
  running = false;
  await startCamera(facingMode);
  running = true; loop();
});

// ═══════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════
const loader       = document.getElementById("loader");
const loaderStatus = document.getElementById("loader-status");

(async () => {
  try {
    loaderStatus.textContent = "Requesting camera…";
    await startCamera(facingMode);

    loaderStatus.textContent = "Loading hand-detection model (~8 MB)…";
    await setupDetector();

    loader.classList.add("hidden");
    statusEl.textContent = "Show hand…"; statusEl.className = "waiting";
    updateOutput();
    running = true; loop();

    // Nudge user to enter API key if not set
    if (!apiKey) setTimeout(() => apikeyInput.focus(), 700);

  } catch (err) {
    loaderStatus.textContent = "";
    document.querySelector(".spinner").style.display = "none";
    const msg = document.createElement("div");
    msg.style.cssText = "color:#ff5f72;font-size:.9rem;max-width:300px;text-align:center;line-height:1.6";
    msg.innerHTML = err.name === "NotAllowedError"
      ? "Camera access denied.<br>Allow camera permission and reload."
      : `Error: ${err.message}<br><small>Open via <strong>HTTPS</strong> or <strong>localhost</strong>.</small>`;
    loader.appendChild(msg);
    console.error(err);
  }
})();
</script>
</body>
</html>
